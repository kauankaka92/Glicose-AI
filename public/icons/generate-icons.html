<!DOCTYPE html>
<html>
<head><title>Gerar Icones</title></head>
<body>
<canvas id="canvas" width="512" height="512"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Fundo azul
ctx.fillStyle = '#007aff';
ctx.fillRect(0, 0, 512, 512);

// Bordas arredondadas (simulado)
ctx.beginPath();
ctx.roundRect(0, 0, 512, 512, 120);
ctx.clip();

// Símbolo de gota ( Diabetes)
ctx.fillStyle = 'white';
ctx.beginPath();
ctx.moveTo(256, 100);
ctx.bezierCurveTo(256, 100, 180, 200, 180, 280);
ctx.bezierCurveTo(180, 380, 256, 420, 256, 420);
ctx.bezierCurveTo(256, 420, 332, 380, 332, 280);
ctx.bezierCurveTo(332, 200, 256, 100, 256, 100);
ctx.fill();

// Círculo azul no centro
ctx.fillStyle = '#007aff';
ctx.beginPath();
ctx.arc(256, 256, 60, 0, Math.PI * 2);
ctx.fill();

// Download 512
canvas.toBlob(blob => {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'icon-512.png';
  a.click();
});

// Gerar 192
const canvas192 = document.createElement('canvas');
canvas192.width = 192;
canvas192.height = 192;
const ctx192 = canvas192.getContext('2d');
ctx192.drawImage(canvas, 0, 0, 192, 192);
canvas192.toBlob(blob => {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'icon-192.png';
  setTimeout(() => a.click(), 1000);
});
</script>
<p>Clique com botão direito → Salvar como em cada link que aparecerá</p>
</body>
</html>
