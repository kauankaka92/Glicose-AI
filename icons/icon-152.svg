<svg xmlns="http://www.w3.org/2000/svg" width="152" height="152" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#14192b" />
    </linearGradient>
    <!-- Droplet Glow Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4766" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <!-- Sparkle/Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect width="512" height="512" rx="33" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="2"/>
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="270" r="150" fill="none" stroke="rgba(255, 71, 102, 0.06)" stroke-width="32" filter="url(#glow)"/>
  
  <!-- Blood/Glucose Droplet -->
  <path d="M256 120 C256 120 146 250 146 320 C146 380.7 195.3 430 256 430 C316.7 430 366 380.7 366 320 C366 250 256 120 256 120 Z" fill="url(#dropGrad)" filter="url(#glow)" />
  
  <!-- Pulse Line crossing the drop -->
  <path d="M190 310 H230 L242 275 L254 345 L266 295 L278 325 L290 310 H322" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />

  <!-- AI Spark / Pulse inside Droplet -->
  <path d="M256 215 L260 235 L280 239 L260 243 L256 263 L252 243 L232 239 L252 235 Z" fill="#ffffff" />
</svg>