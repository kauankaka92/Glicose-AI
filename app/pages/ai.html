<section id="page-ai" class="page" aria-label="Assistente Clínico">
  <div class="ai-topbar">
    <div class="ai-topbar-info">
      <div class="ai-topbar-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
      </div>
      <div>
        <span class="ai-topbar-title">Assistente Clínico</span>
        <span class="ai-topbar-status"><span class="ai-status-dot" aria-hidden="true"></span>online</span>
      </div>
    </div>
    <button id="ai-clear" class="btn btn-ghost btn-sm" type="button" aria-label="Limpar conversa">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      Limpar
    </button>
  </div>

  <div id="ai-messages" class="ai-messages" role="log" aria-live="polite" aria-label="Conversa com assistente clínico"></div>

  <form id="ai-form" class="ai-input-bar" novalidate>
    <div class="ai-input-wrap">
      <div class="ai-input-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
      </div>
      <input
        id="ai-input"
        type="text"
        placeholder="Ex: comi arroz e feijão, glicose 180..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Mensagem para o assistente clínico"
        maxlength="500"
      />
    </div>
    <button id="ai-send" type="submit" aria-label="Enviar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9l20-7z"/>
      </svg>
    </button>
  </form>
</section>
