<section id="page-ai" class="page" aria-label="Assistente IA">
  <div id="ai-messages" class="ai-messages" role="log" aria-live="polite" aria-label="Conversa com IA"></div>
  <form id="ai-form" class="ai-input-bar" novalidate>
    <div class="ai-input-wrap">
      <input
        id="ai-input"
        type="text"
        placeholder="Pergunte sobre sua saúde..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Mensagem para o assistente"
        maxlength="500"
      />
    </div>
    <button id="ai-send" type="submit" aria-label="Enviar mensagem">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9l20-7z"/>
      </svg>
    </button>
  </form>
</section>
